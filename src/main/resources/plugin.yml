name: InventorySwap
version: '${version}'
main: com.xton.inventoryswap.InventorySwapPlugin
api-version: '1.21'
author: xton
description: Swap your inventory between named loadouts by right-clicking a sign or container.

commands:
  inv:
    description: Manage inventory swap loadouts.
    aliases: [invswap]
    usage: |-
      /inv list [player]
      /inv current [player]
      /inv swap <loadout> [player]
      /inv create <loadout> [player]
      /inv delete <loadout> [player]
      /inv rename <old> <new> [player]
    permission: inventoryswap.admin

permissions:
  inventoryswap.use:
    description: Allows switching inventory loadouts via signs and containers.
    default: true
  inventoryswap.admin:
    description: Allows managing inventory loadouts for any player via commands.
    default: op
