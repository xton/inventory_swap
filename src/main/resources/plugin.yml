name: InventorySwap
version: '${version}'
main: com.xton.inventoryswap.InventorySwapPlugin
api-version: '1.21'
author: xton
description: Swap your inventory between named profiles by right-clicking a sign or container.

commands:
  inv:
    description: Manage inventory swap profiles.
    aliases: [invswap]
    usage: |-
      /inv list [player]
      /inv current [player]
      /inv swap <profile> [player]
      /inv create <profile> [player]
      /inv delete <profile> [player]
      /inv rename <old> <new> [player]
    permission: inventoryswap.admin

permissions:
  inventoryswap.use:
    description: Allows switching inventory profiles via signs and containers.
    default: true
  inventoryswap.admin:
    description: Allows managing inventory profiles for any player via commands.
    default: op
